<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg0:#0b0d12; --bg1:#0f131b;
      --text:#e7edf7; --muted:#98a6bf;
      --accent:#2a6df4; --shadow: 0 18px 50px rgba(0,0,0,.55);
      --radius: 16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 15% 10%, rgba(42,109,244,.20), transparent 55%),
        radial-gradient(900px 500px at 85% 10%, rgba(43,212,255,.12), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      min-height:100vh;
      padding:22px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card{
      width: min(520px, 92vw);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(120,140,190,.20);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:18px;
    }
    h1{ margin:0 0 6px 0; font-size:20px; }
    .muted{ color:var(--muted); font-size:13px; margin-bottom:12px; }
    input{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(120,140,190,.25);
      background: rgba(8,10,15,.55);
      color: var(--text);
      outline:none;
      font-size:14px;
    }
    input:focus{
      border-color: rgba(42,109,244,.85);
      box-shadow: 0 0 0 4px rgba(42,109,244,.18);
    }
    button{
      width:100%;
      margin-top:10px;
      padding:12px 12px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      font-weight:800;
      background: linear-gradient(180deg, rgba(42,109,244,1), rgba(32,86,205,1));
      color:white;
      box-shadow: 0 14px 26px rgba(42,109,244,.28);
    }
    button:hover{ filter: brightness(1.06); }
    .error{
      margin-top:12px;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid rgba(255,77,77,.25);
      background: rgba(255,77,77,.10);
      color:#ffd0d0;
      font-size:13px;
      line-height:1.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>
    <div class="muted">Введите пароль панели</div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <input name="password" type="password" placeholder="Password" autofocus>
      <button type="submit">Enter</button>
    </form>
  </div>
</body>
</html>
