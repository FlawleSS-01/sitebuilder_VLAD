<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Parser Results</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:#0b0d12;color:#e7edf7;padding:22px}
    .wrap{max-width:1200px;margin:0 auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .nav{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    a{color:#bcd3ff;text-decoration:none}
    a:hover{text-decoration:underline}
    .card{background:#121826;border:1px solid rgba(120,140,190,.2);border-radius:16px;padding:16px}
    textarea{width:100%;height:260px;border-radius:14px;border:1px solid rgba(120,140,190,.25);background:rgba(8,10,15,.55);color:#e7edf7;padding:14px;font-size:13px;line-height:1.35}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
    .btn{border:none;cursor:pointer;border-radius:12px;padding:10px 12px;font-weight:900;background:linear-gradient(180deg,#2a6df4,#2056cd);color:#fff}
    .btn2{border:1px solid rgba(120,140,190,.25);background:rgba(255,255,255,.03);color:#e7edf7}
    .muted{color:#98a6bf;font-size:13px}
    .err{margin-top:10px;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,77,77,.25);background:rgba(255,77,77,.10);color:#ffd0d0;font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div style="font-weight:900;font-size:20px">Parser Results</div>
        <div class="muted">Sitemaps parsed: {{ sitemaps }} | URLs: {{ urls|length }}</div>
      </div>
      <div class="nav">
        <a href="/">Generator</a>
        <a href="/parser">Parser</a>
        <a href="/logout">Logout</a>
      </div>
    </div>

    <div class="card">
      {% if errors and errors|length %}
        <div class="err">
          <b>Ошибки:</b><br/>
          {% for e in errors %}• {{ e }}<br/>{% endfor %}
        </div>
      {% endif %}

      <div class="row">
        <a class="btn btn2" href="/parser">← Back</a>
        <a class="btn" href="/parser/download.txt">Download TXT</a>
        <a class="btn" href="/parser/download.csv">Download CSV</a>
        <button class="btn btn2" type="button" id="copyBtn">Copy</button>
      </div>

      <textarea id="box" readonly>{% for u in urls %}{{ u }}
{% endfor %}</textarea>
    </div>
  </div>

  <script>
    const btn = document.getElementById('copyBtn');
    const box = document.getElementById('box');
    btn.addEventListener('click', async () => {
      try{
        await navigator.clipboard.writeText(box.value);
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1000);
      }catch(e){
        box.focus(); box.select(); document.execCommand('copy');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1000);
      }
    });
  </script>
</body>
</html>
