<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>URL Parser (Sitemap)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:#0b0d12;color:#e7edf7;padding:22px}
    .wrap{max-width:1200px;margin:0 auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .nav{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    .nav a{color:#bcd3ff;text-decoration:none;font-weight:800;font-size:15px}
    .nav a:hover{text-decoration:underline}
    .card{background:#121826;border:1px solid rgba(120,140,190,.2);border-radius:16px;padding:16px}
    textarea{width:100%;height:320px;border-radius:14px;border:1px solid rgba(120,140,190,.25);background:rgba(8,10,15,.55);color:#e7edf7;padding:14px;font-size:13px;line-height:1.35}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:12px 0}
    .btn{border:none;cursor:pointer;border-radius:12px;padding:12px 16px;font-weight:900;background:linear-gradient(180deg,#2a6df4,#2056cd);color:#fff}
    .btn2{border:1px solid rgba(120,140,190,.25);background:rgba(255,255,255,.03);color:#e7edf7}
    .muted{color:#98a6bf;font-size:13px}
    select{background:rgba(8,10,15,.55);color:#e7edf7;border:1px solid rgba(120,140,190,.25);border-radius:12px;padding:10px 12px;font-weight:800}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div style="font-weight:900;font-size:22px">URL Parser (Sitemap)</div>
        <div class="muted">Вставь домены/URL/сайтмапы → получи список URL</div>
      </div>
      <div class="nav">
        <a href="/">Generator</a>
        <a href="/parser">Parser</a>
        <a href="/gsc">GSC</a>
        <a href="/logout">Logout</a>
      </div>
    </div>

    <div class="card">
      <form method="post" action="/parser/run">
        <textarea name="targets" placeholder="bb444.bet&#10;https://site.com/sitemap.xml&#10;https://site.com/sitemap.xml.gz"></textarea>

        <div class="row">
          <label class="muted" style="font-weight:900">В таблицу (Sheets):</label>
          <select name="sheet_mode">
            <option value="view" selected>просто парсинг (ничего не пишем)</option>
            <option value="update">контент обновлял (пишем дату изменения)</option>
          </select>

          <button class="btn" type="submit">Parse</button>
        </div>

        <div class="muted">По умолчанию для домена берётся <b>/sitemap.xml</b>. Поддерживает <b>sitemapindex</b> и <b>.xml.gz</b>.</div>
      </form>
    </div>
  </div>
</body>
</html>
